services:
  - type: web
    name: scianalyzer-ai
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_MODEL
        sync: false
      - key: OPENROUTER_MODEL
        sync: false
      - key: HUGGINGFACE_MODEL
        sync: false
      - key: GEMINI_MODEL
        sync: false
